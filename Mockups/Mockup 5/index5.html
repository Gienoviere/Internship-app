<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AnimalCare – Quick Tasks</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f5f7fb; }
    .card-soft { border: 1px solid rgba(0,0,0,.08); border-radius: 1rem; }
    .muted { color: rgba(0,0,0,.6); }
    .task-row { border: 1px solid rgba(0,0,0,.08); border-radius: .9rem; background:#fff; }
    .task-name { font-weight: 600; }
    .pill { font-size: .8rem; padding: .25rem .55rem; border-radius: 999px; background: rgba(0,0,0,.06); }
    .sticky-actions { position: sticky; bottom: 0; background: #f5f7fb; padding-top: .75rem; }
  </style>
</head>

<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand fw-semibold">AnimalCare</span>
    <div class="d-flex align-items-center gap-2">
      <span class="badge text-bg-secondary" id="roleBadge5">Not logged in</span>
      <button class="btn btn-outline-light btn-sm d-none" id="btnLogout5">Logout</button>
    </div>
  </div>
</nav>

<div class="container py-4" style="max-width: 900px;">

  <div id="alertBox5" class="alert d-none" role="alert"></div>

  <!-- LOGIN -->
  <div id="viewLogin5" class="card card-soft shadow-sm">
    <div class="card-body p-4">
      <h4 class="mb-1">Sign in</h4>
      <div class="muted mb-4">Quickly log today’s animal care tasks.</div>

      <form id="loginForm5" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input class="form-control" id="loginEmail5" required />
        </div>
        <div class="col-md-6">
          <label class="form-label">Password</label>
          <input class="form-control" id="loginPassword5" type="password" required />
        </div>

        <div class="col-12 d-flex gap-2">
          <button class="btn btn-primary" type="submit">Login</button>
          <button class="btn btn-outline-secondary" type="button" id="btnDemoFill5">Demo</button>
        </div>
      </form>

      <div class="small muted mt-3">
        Tip: run with VS Code Live Server or <code>npx serve .</code>.
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="viewApp5" class="d-none">

    <!-- Header / Quick controls -->
    <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-3">
      <div>
        <h3 class="mb-1">Today</h3>
        <div class="muted" id="subTitle5">Load tasks and tap Done.</div>
      </div>

      <div class="d-flex gap-2 align-items-center">
        <input type="datetime-local" class="form-control" style="max-width: 190px;" id="date5" />
        <button class="btn btn-outline-primary" id="btnRefresh5">Refresh</button>
      </div>
    </div>

    <!-- Progress -->
    <div class="card card-soft shadow-sm mb-3">
      <div class="card-body d-flex flex-wrap align-items-center justify-content-between gap-2">
        <div>
          <div class="fw-semibold">Progress</div>
          <div class="small muted" id="progressText5">—</div>
        </div>
        <div class="flex-grow-1" style="min-width: 240px;">
          <div class="progress" role="progressbar" aria-label="progress">
            <div class="progress-bar" id="progressBar5" style="width: 0%"></div>
          </div>
        </div>
        <span class="pill" id="pillCount5">—</span>
      </div>
    </div>

    <!-- Tasks list -->
    <div id="tasksList5" class="d-grid gap-2"></div>

    <!-- Sticky quick actions (optional) -->
    <div class="sticky-actions mt-3">
      <div class="d-flex justify-content-between align-items-center">
        <div class="small muted">Fast logging — no extra screens.</div>
        <button class="btn btn-outline-dark btn-sm" id="btnScrollTop5">Top</button>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./app5.js"></script>
</body>
</html>
