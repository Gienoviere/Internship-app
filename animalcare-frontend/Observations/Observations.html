<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AnimalCare - Observations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .photo-preview {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: .75rem;
      border: 1px solid #dee2e6;
      display: none;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand fw-semibold">AnimalCare</span>

      <div class="d-flex align-items-center gap-2 flex-wrap">
        <label for="globalDateObs" class="text-white-50 small mb-0">Date</label>
        <input type="date" class="form-control form-control-sm" id="globalDateObs" style="max-width: 140px;">
        <button class="btn btn-outline-light btn-sm" id="btnRefreshObs">Refresh</button>
        <span class="badge text-bg-secondary" id="userRoleBadgeObs">Not logged in</span>
        <button class="btn btn-outline-light btn-sm d-none" id="btnLogout3">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <aside class="col-md-3 col-lg-2 bg-white border-end min-vh-100">
        <div class="py-3">
          <ul class="nav nav-pills flex-column gap-1" id="sidebarNav">
            <li class="nav-item"><a class="nav-link" href="/index.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/Tasks/tasks.html"><i class="bi bi-list-check me-2"></i>Tasks</a></li>
            <li class="nav-item"><a class="nav-link" href="/inventory/index.html"><i class="bi bi-box-seam me-2"></i>Inventory</a></li>
            <li class="nav-item"><a class="nav-link active" href="Observations.html"><i class="bi bi-journal-text me-2"></i>Observations</a></li>
            <li class="nav-item"><a class="nav-link text-dark" href="/manual/index.html"><i class="bi bi-book me-2"></i>Manual</a></li>
          </ul>
        </div>
      </aside>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h1 class="h2 mb-0">Observations</h1>
            <p class="text-muted mb-0">Report issues with animals, food, care tasks, or daily farm events</p>
          </div>
        </div>

        <div id="alertBoxObs" class="alert d-none"></div>

        <div class="card shadow-sm mb-3">
          <div class="card-body">
            <h5 class="mb-3"><i class="bi bi-plus-circle me-2"></i>New observation</h5>

            <div class="row g-2">
              <div class="col-md-4">
                <input id="obsTitle3" class="form-control form-control-sm" placeholder="Title (e.g. pig limping)">
              </div>
              <div class="col-md-3">
                <input id="obsAnimal3" class="form-control form-control-sm" placeholder="Animal/Location (optional)">
              </div>
              <div class="col-md-2">
                <select id="obsSeverity3" class="form-select form-select-sm">
                  <option value="INFO">INFO</option>
                  <option value="WARN">WARN</option>
                  <option value="CRITICAL">CRITICAL</option>
                </select>
              </div>
              <div class="col-md-3">
                <select id="obsTaskId3" class="form-select form-select-sm">
                  <option value="">No linked task</option>
                </select>
              </div>
              <div class="col-md-12">
                <textarea id="obsDesc3" class="form-control form-control-sm" rows="3" placeholder="Description"></textarea>
              </div>
              <div class="col-md-6">
                <label class="form-label small">Photo</label>
                <input id="obsPhoto3" type="file" class="form-control form-control-sm" accept="image/*">
              </div>
              <div class="col-md-12">
                <img id="obsPhotoPreview3" class="photo-preview" alt="Observation preview">
              </div>
            </div>

            <div class="mt-3">
              <button class="btn btn-primary btn-sm" id="btnObsCreate3">
                <i class="bi bi-plus-circle me-1"></i>Add observation
              </button>
            </div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="mb-3"><i class="bi bi-eye me-2"></i>Observation list</h5>
            <div id="obsList3"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal fade" id="editObservationModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit observation</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editObsId3">

          <div class="mb-3">
            <label class="form-label">Title</label>
            <input id="editObsTitle3" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Animal/Location</label>
            <input id="editObsAnimal3" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Severity</label>
            <select id="editObsSeverity3" class="form-select">
              <option value="INFO">INFO</option>
              <option value="WARN">WARN</option>
              <option value="CRITICAL">CRITICAL</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Status</label>
            <select id="editObsStatus3" class="form-select">
              <option value="OPEN">OPEN</option>
              <option value="RESOLVED">RESOLVED</option>
              <option value="IGNORED">IGNORED</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Linked task</label>
            <select id="editObsTaskId3" class="form-select">
              <option value="">No linked task</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="editObsDesc3" class="form-control" rows="4"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" id="btnUpdateObs3">Save changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/js/observations-page.js"></script>
  <script type="module" src="/js/userRoleBadge.js"></script>
</body>
</html>
