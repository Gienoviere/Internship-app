<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AnimalCare - Observations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand fw-semibold">AnimalCare</span>

      <div class="d-flex align-items-center gap-2 flex-wrap">
        <label for="globalDateObs" class="text-white-50 small mb-0">Date</label>
        <input
          type="date"
          class="form-control form-control-sm"
          id="globalDateObs"
          style="max-width: 110px;"
        >
        <button class="btn btn-outline-light btn-sm" id="btnRefreshObs">Refresh</button>
        <span class="badge text-bg-secondary" id="userRoleBadge3">Not logged in</span>
        <button class="btn btn-outline-light btn-sm d-none" id="btnLogout3">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <aside class="col-md-3 col-lg-2 bg-white border-end min-vh-100">
        <div class="py-3">
          <ul class="nav nav-pills flex-column gap-1" id="sidebarNav">
            <li class="nav-item">
              <a class="nav-link" href="/index.html" data-page="index.html">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/Tasks/tasks.html" data-page="tasks.html">
                <i class="bi bi-list-check me-2"></i>Tasks
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/inventory/index.html" data-page="index.html">
                <i class="bi bi-box-seam me-2"></i>Inventory
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="observations.html" data-page="observations.html">
                <i class="bi bi-journal-text me-2"></i>Observations
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link text-dark" href="/manual/index.html">
                <i class="bi bi-book me-2"></i>Manual
              </a>
            </li>

            <li class="nav-item mt-4"><h6 class="sidebar-heading px-3 text-muted">Snel acties</h6></li>
            <li class="nav-item"><a class="nav-link text-dark" href="#" data-bs-toggle="modal" data-bs-target="#quickLogModal"><i class="bi bi-plus-circle"></i> Snelle log</a></li>
            <li class="nav-item"><a class="nav-link text-dark" href="#" data-bs-toggle="modal" data-bs-target="#photoUploadModal"><i class="bi bi-camera"></i> Foto uploaden</a></li>

          </ul>
        </div>
      </aside>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h1 class="h2 mb-0">Observations</h1>
            <p class="text-muted mb-0">Record and review animal observations</p>
          </div>
        </div>

        <div id="alertBoxObs" class="alert d-none"></div>

        <div class="card shadow-sm mb-3">
          <div class="card-body">
            <h5 class="mb-3"><i class="bi bi-plus-circle me-2"></i>New observation</h5>

            <div class="row g-2">
              <div class="col-md-4">
                <input id="obsTitle3" class="form-control form-control-sm" placeholder="Title (e.g. pig limping)">
              </div>
              <div class="col-md-3">
                <input id="obsAnimal3" class="form-control form-control-sm" placeholder="Animal/Location (optional)">
              </div>
              <div class="col-md-2">
                <select id="obsSeverity3" class="form-select form-select-sm">
                  <option value="INFO">INFO</option>
                  <option value="WARN">WARN</option>
                  <option value="CRITICAL">CRITICAL</option>
                </select>
              </div>
              <div class="col-md-12">
                <textarea id="obsDesc3" class="form-control form-control-sm" rows="3" placeholder="Description (optional)"></textarea>
              </div>
            </div>

            <div class="mt-3">
              <button class="btn btn-primary btn-sm" id="btnObsCreate3">
                <i class="bi bi-plus-circle me-1"></i>Add observation
              </button>
            </div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="mb-3"><i class="bi bi-eye me-2"></i>Observation list</h5>
            <div id="obsList3"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- modal of quick logs -->
   <div class="modal fade" id="quickLogModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add quick log</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label class="form-label">Task</label>
            <select class="form-select" id="quickLogTask3">
              <option value="">Select a task</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Amount (grams)</label>
            <input type="number" class="form-control" id="quickLogQty3" min="0">
          </div>

          <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea class="form-control" id="quickLogNotes3" rows="2"></textarea>
          </div>

          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="quickLogCompleted3" checked>
            <label class="form-check-label" for="quickLogCompleted3">Mark as completed</label>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" id="btnQuickLogSubmit">Add</button>
      </div>
    </div>
  </div>
</div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/js/observations-page.js"></script>
  <script>
  async function syncNavbarUserShared() {
    const badge =
      document.getElementById("userRoleBadge3") ||
      document.getElementById("userRoleBadge") ||
      document.getElementById("userRoleBadgeObs");

    const logoutBtn =
      document.getElementById("btnLogout3") ||
      document.getElementById("btnLogoutObs");

    const token = localStorage.getItem("token");

    if (!token) {
      if (badge) badge.textContent = "Not logged in";
      if (logoutBtn) logoutBtn.classList.add("d-none");
      return;
    }

    try {
      const res = await fetch("http://localhost:3001/auth/me", {
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      if (!res.ok) throw new Error("Failed to load current user");

      const me = await res.json();
      const currentUser = me.user || me;

      if (badge) badge.textContent = currentUser?.role || "Unknown role";

      if (logoutBtn) {
        logoutBtn.classList.remove("d-none");
        logoutBtn.onclick = () => {
          localStorage.removeItem("token");
          window.location.href = "/index.html";
        };
      }
    } catch (err) {
      console.error("Navbar auth sync failed:", err);
      if (badge) badge.textContent = "Not logged in";
      if (logoutBtn) logoutBtn.classList.add("d-none");
    }
  }

  document.addEventListener("DOMContentLoaded", syncNavbarUserShared);
</script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      const links = document.querySelectorAll('#sidebarNav .nav-link');

      links.forEach(link => {
        const page = link.getAttribute('data-page');
        if (page === currentPage) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    });
  </script>
</body>
</html>
