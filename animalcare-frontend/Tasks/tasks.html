<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AnimalCare - Tasks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand fw-semibold">AnimalCare</span>
      <div class="d-flex align-items-center gap-2">
        <span class="badge text-bg-secondary" id="userRoleBadge">Not logged in</span>
        <button class="btn btn-outline-light btn-sm d-none" id="btnLogout3">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <aside class="col-md-3 col-lg-2 bg-white border-end min-vh-100">
        <div class="py-3">
            <ul class="nav nav-pills flex-column gap-1" id="sidebarNav">
            <li class="nav-item">
                <a class="nav-link" href="index3.html" data-page="index3.html">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="tasks.html" data-page="tasks.html">
                <i class="bi bi-list-check me-2"></i>Tasks
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="index.html" data-page="index.html">
                <i class="bi bi-box-seam me-2"></i>Inventory
                </a>
            </li>
            </ul>
        </div>
        </aside>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h1 class="h2 mb-0">Tasks</h1>
            <p class="text-muted mb-0">Daily task logging and supervisor approvals</p>
          </div>

          <div class="d-flex gap-2 align-items-center">
            <input type="date" class="form-control form-control-sm" id="globalDate3" style="max-width:180px;">
            <button class="btn btn-outline-primary btn-sm" id="btnRefresh3">Refresh</button>
          </div>
        </div>

        <div id="alertBox3" class="alert d-none"></div>

        <!-- Tasks -->
        <div class="card shadow-sm mb-3">
          <div class="card-body">
            <h5 class="mb-3"><i class="bi bi-list-task me-2"></i>Today's tasks</h5>
            <div class="table-responsive">
              <table class="table table-sm align-middle">
                <thead>
                  <tr>
                    <th>Task</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th style="width: 260px;">Log</th>
                  </tr>
                </thead>
                <tbody id="tasksTable3"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Supervisor queue -->
        <div class="card shadow-sm supervisor-only">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div>
                <h5 class="mb-0"><i class="bi bi-shield-check me-2"></i>Pending approvals</h5>
                <div class="text-muted small">Logs awaiting supervisor approval</div>
              </div>
              <span class="badge bg-warning text-dark" id="supPendingCount3">0</span>
            </div>

            <div id="supQueue3"></div>
          </div>
        </div>

        
      </main>
    </div>
  </div>

  <script>
        document.addEventListener('DOMContentLoaded', () => {
        const currentPage = window.location.pathname.split('/').pop() || 'index3.html';
        const links = document.querySelectorAll('#sidebarNav .nav-link');

        links.forEach(link => {
            const page = link.getAttribute('data-page');
            if (page === currentPage) {
            link.classList.add('active');
            } else {
            link.classList.remove('active');
            }
        });
        });
    </script>

    <script type="module" src="/js/tasks-page.js"></script>
</body>
</html>
