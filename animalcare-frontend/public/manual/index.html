<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AnimalCare · Manual</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    [contenteditable="true"] {
      background-color: #fff3cd;
      border: 1px dashed #ffc107;
      padding: 0.25rem 0.5rem;
      border-radius: 0.375rem;
      outline: none;
    }
    [contenteditable="true"]:focus {
      background-color: #fff9e6;
      border-color: #b8860b;
    }
  </style>
</head>
<body class="bg-body-tertiary">

  <!-- Navbar placeholder -->
  <div id="navbar-placeholder"></div>

  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar placeholder -->
      <div id="sidebar-placeholder" class="col-lg-2"></div>

      <!-- Inhoud manual-pagina -->
      <main class="col-12 col-lg-10 px-3 px-md-4 py-3">
        <div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
          <h1 class="h3 mb-0" id="manualTitle">Manual</h1>
          <button class="btn btn-outline-secondary btn-sm" id="toggleEditBtn" title="Bewerkmodus aan/uit">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-outline-success btn-sm d-none" id="saveEditBtn" title="Wijzigingen opslaan">
            <i class="bi bi-check-lg"></i> Opslaan
          </button>
          <button class="btn btn-outline-danger btn-sm d-none" id="cancelEditBtn" title="Annuleren">
            <i class="bi bi-x-lg"></i>
          </button>
          <span id="saveStatus" class="small text-muted"></span>
        </div>

        <div id="manualContent">
          <p id="manualText">Laden...</p>
          <!-- Je kunt hier meer bewerkbare elementen toevoegen, elk met een uniek id -->
        </div>
      </main>
    </div>
  </div>

  <!-- Footer placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/include.js"></script>
</body>
</html>
